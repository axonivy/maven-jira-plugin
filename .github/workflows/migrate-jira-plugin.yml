name: Migrate Jira Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to migrate to'
        required: true
        default: '14.0.0'

jobs:
  migrate:
    name: Migrate ${{ matrix.repo }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        repo:
          - dev.axonivy.com
          - github-repo-manager
    steps:
      - uses: actions/checkout@v4

      - name: Migrate ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ matrix.repo }}
        run: |
          gh repo clone axonivy/$REPO
          cd $REPO
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="migrate-jira-plugin-to-${VERSION}"
          git checkout -b $BRANCH
          python3 "$GITHUB_WORKSPACE/.github/scripts/update-jira-plugin-version.py" \
            "${VERSION}" $(find . -name 'pom.xml')
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit in $REPO"
          else
            git commit -m "Migrate ch.ivyteam.maven:jira-plugin to ${VERSION}"
            git push origin $BRANCH
            gh pr create \
              --repo axonivy/$REPO \
              --head $BRANCH \
              --title "Migrate ch.ivyteam.maven:jira-plugin to ${VERSION}" \
              --body "Migrate the Maven plugin \`ch.ivyteam.maven:jira-plugin\` to version \`${VERSION}\`."
          fi
